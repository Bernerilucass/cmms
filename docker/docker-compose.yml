version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: cmms_postgres
    environment:
      POSTGRES_DB: cmms_db
      POSTGRES_USER: cmms_user
      POSTGRES_PASSWORD: cmms_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cmms_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: cmms_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cmms.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - cmms_network

volumes:
  postgres_data:

networks:
  cmms_network:
    driver: bridge